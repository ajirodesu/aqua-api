<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050508">
  <title>404 — Page Not Found</title>
  <link rel="icon" href="/docs/image/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
/* ── RESET ────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

/* ── TOKENS ───────────────────────────────────────────────────── */
:root{
  --bg:   #050508;
  --s1:   #0e0e12;
  --s2:   #16161b;
  --s3:   #1c1c23;
  --bd:   #252530;
  --bd2:  #32323f;
  --t1:   #f0f0f5;
  --t2:   #a0a0b8;
  --t3:   #585870;
  --gold: #FBBF24;
  --ora:  #F97316;
  --g10:  rgba(251,191,36,.10);
  --g20:  rgba(251,191,36,.20);
  --grn:  #4ade80;
  --red:  #f87171;
  --blu:  #60a5fa;
  --pur:  #a78bfa;
  --rs:6px;--rm:10px;--rl:14px;--rxl:18px;
  --fh:'Space Grotesk',sans-serif;
  --fm:'Space Mono',monospace;
  --HH:56px;
}

/* ── BASE ─────────────────────────────────────────────────────── */
html{scroll-behavior:smooth;overflow-x:hidden;}
body{
  background:var(--bg);color:var(--t1);
  font-family:var(--fm);font-size:13px;line-height:1.65;
  min-height:100vh;overflow-x:hidden;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── GRID BACKGROUND ──────────────────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.055) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,#000 50%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,#000 50%,transparent 100%);
}

/* ── BLOBS ────────────────────────────────────────────────────── */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(120px);}
.b1{width:460px;height:460px;background:radial-gradient(circle,rgba(248,113,113,.08) 0%,transparent 65%);top:-140px;right:-100px;}
.b2{width:340px;height:340px;background:radial-gradient(circle,rgba(251,191,36,.06) 0%,transparent 65%);bottom:-80px;left:-80px;}
.b3{width:260px;height:260px;background:radial-gradient(circle,rgba(96,165,250,.05) 0%,transparent 65%);top:40%;left:55%;}

/* ── HEADER ───────────────────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:600;
  height:var(--HH);
  background:rgba(5,5,8,.90);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border-bottom:1px solid var(--bd);
}
.hdr-inner{
  height:100%;padding:0 14px;
  display:flex;align-items:center;
  justify-content:space-between;gap:10px;
}
.hdr-left,.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hdr-mid{
  font-family:var(--fh);font-size:14px;font-weight:700;
  color:var(--t1);letter-spacing:-.01em;
  flex:1;text-align:center;
}
.hico{
  width:36px;height:36px;border-radius:var(--rs);
  border:1px solid var(--bd2);background:var(--s1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:14px;
  text-decoration:none;
  transition:border-color .18s,color .18s,box-shadow .18s;
  position:relative;flex-shrink:0;
}
.hico:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px var(--g10);}

/* ── MAIN ─────────────────────────────────────────────────────── */
main{
  position:relative;z-index:1;
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:calc(var(--HH) + 40px) 22px 60px;
}

/* ── ERROR CARD ───────────────────────────────────────────────── */
.err-card{
  width:100%;max-width:480px;
  background:var(--s1);border:1px solid var(--bd);
  border-radius:var(--rxl);overflow:hidden;
  position:relative;
  opacity:0;transform:translateY(22px);
  animation:fadeUp .6s cubic-bezier(.16,1,.3,1) .15s forwards;
}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* top accent bar */
.err-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--red) 35%,var(--ora) 65%,transparent 100%);
}

/* ── CODE SECTION ─────────────────────────────────────────────── */
.err-top{
  padding:36px 32px 28px;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
  border-bottom:1px solid var(--bd);
  position:relative;overflow:hidden;
}
.err-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(248,113,113,.04) 0%,transparent 55%);
  pointer-events:none;
}

/* The big 404 number */
.err-code-wrap{position:relative;margin-bottom:20px;}
.err-code{
  font-family:var(--fh);font-weight:700;font-size:clamp(80px,18vw,120px);
  letter-spacing:-.04em;line-height:1;
  background:linear-gradient(135deg,var(--red) 0%,var(--ora) 55%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative;z-index:1;
  /* subtle shimmer animation */
  animation:shimmer 4s ease-in-out infinite alternate;
}
@keyframes shimmer{
  0%{filter:brightness(1);}
  100%{filter:brightness(1.18);}
}
/* ghost echo behind the number */
.err-code-ghost{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  font-family:var(--fh);font-weight:700;font-size:clamp(80px,18vw,120px);
  letter-spacing:-.04em;line-height:1;
  color:transparent;
  -webkit-text-stroke:1px rgba(248,113,113,.12);
  pointer-events:none;white-space:nowrap;
}

.err-icon{
  width:44px;height:44px;border-radius:var(--rl);
  background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--red);
  margin-bottom:16px;
  animation:iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.0);}
  50%{box-shadow:0 0 0 6px rgba(248,113,113,.08);}
}

.err-title{
  font-family:var(--fh);font-size:20px;font-weight:700;
  color:var(--t1);letter-spacing:-.02em;margin-bottom:8px;
}
.err-msg{
  font-family:var(--fm);font-size:11px;color:var(--t2);
  line-height:1.7;max-width:320px;
}

/* ── PATH DISPLAY ─────────────────────────────────────────────── */
.err-path-row{
  display:flex;align-items:center;gap:8px;
  margin-top:18px;
  background:var(--s2);border:1px solid var(--bd2);
  border-radius:var(--rm);padding:9px 13px;
  max-width:340px;width:100%;
}
.err-path-ico{font-size:10px;color:var(--t3);flex-shrink:0;}
.err-path-txt{
  font-family:var(--fm);font-size:11px;color:var(--t3);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  text-align:left;
}
.err-badge{
  font-family:var(--fm);font-size:8px;font-weight:700;
  padding:2px 7px;border-radius:3px;letter-spacing:.06em;flex-shrink:0;
  text-transform:uppercase;
  background:rgba(248,113,113,.12);color:var(--red);
}

/* ── ACTIONS ──────────────────────────────────────────────────── */
.err-actions{
  padding:20px 24px 24px;
  display:flex;flex-direction:column;gap:10px;
}

/* Primary CTA */
.btn-primary{
  width:100%;padding:11px;border-radius:var(--rm);
  background:linear-gradient(130deg,var(--gold),var(--ora));
  color:#000;font-family:var(--fm);font-size:11px;font-weight:700;
  letter-spacing:.07em;border:none;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .18s,transform .18s,box-shadow .18s;
}
.btn-primary:hover{opacity:.84;transform:translateY(-1px);box-shadow:0 6px 20px var(--g20);}
.btn-primary:active{transform:translateY(0);}

/* Secondary row */
.err-sec-row{display:flex;gap:8px;}
.btn-sec{
  flex:1;padding:9px 12px;border-radius:var(--rm);
  background:var(--s2);border:1px solid var(--bd2);
  font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.05em;
  color:var(--t2);cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:border-color .18s,color .18s;
}
.btn-sec:hover{border-color:var(--gold);color:var(--gold);}

/* ── DIVIDER ──────────────────────────────────────────────────── */
.err-divider{
  height:1px;background:var(--bd);
  margin:0 24px;position:relative;
}
.err-divider::before{
  content:'';position:absolute;left:0;top:0;width:56px;height:1px;
  background:linear-gradient(90deg,var(--red),transparent);
}

/* ── STATUS STRIP ─────────────────────────────────────────────── */
.err-strip{
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.err-strip-left{display:flex;align-items:center;gap:8px;}
.err-strip-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--grn);box-shadow:0 0 6px var(--grn);
  animation:pip 2.2s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes pip{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.65);}}
.err-strip-txt{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;}
.err-strip-code{
  font-family:var(--fm);font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(248,113,113,.1);color:var(--red);
}

/* ── FOOTER NOTE ──────────────────────────────────────────────── */
.err-footer{
  position:relative;z-index:1;
  text-align:center;padding:0 22px 32px;
  font-family:var(--fm);font-size:10px;color:var(--t3);
  opacity:0;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) .4s forwards;
}
.err-footer a{color:var(--t3);text-decoration:none;transition:color .15s;}
.err-footer a:hover{color:var(--gold);}

/* ── SCROLLBAR ────────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px;}
@media(max-width:767px){::-webkit-scrollbar{display:none;}}
  </style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- HEADER -->
<header id="hdr">
  <div class="hdr-inner">
    <div class="hdr-left">
      <a class="hico" href="/" aria-label="Go home"><i class="fas fa-arrow-left"></i></a>
    </div>
    <div class="hdr-mid">Page Not Found</div>
    <div class="hdr-right">
      <a class="hico" href="/docs" aria-label="Documentation"><i class="fas fa-book"></i></a>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="err-card">

    <!-- Top section: giant 404 + message -->
    <div class="err-top">
      <div class="err-code-wrap">
        <div class="err-code-ghost" aria-hidden="true">404</div>
        <div class="err-code">404</div>
      </div>

      <div class="err-icon"><i class="fas fa-route"></i></div>

      <div class="err-title">Page Not Found</div>
      <div class="err-msg">The endpoint you're looking for doesn't exist, has been moved, or the URL was mistyped.</div>

      <!-- Requested path display -->
      <div class="err-path-row">
        <i class="fas fa-terminal err-path-ico"></i>
        <span class="err-path-txt" id="err-path">/unknown/path</span>
        <span class="err-badge">404</span>
      </div>
    </div>

    <div class="err-divider"></div>

    <!-- Action buttons -->
    <div class="err-actions">
      <a class="btn-primary" href="/">
        <i class="fas fa-house" style="font-size:10px;"></i> Back to Dashboard
      </a>
      <div class="err-sec-row">
        <a class="btn-sec" href="/docs">
          <i class="fas fa-book" style="font-size:10px;"></i> Docs
        </a>
        <button class="btn-sec" onclick="history.back()">
          <i class="fas fa-arrow-left" style="font-size:10px;"></i> Go Back
        </button>
        <button class="btn-sec" id="copy-path-btn">
          <i class="fas fa-copy" style="font-size:10px;"></i> Copy URL
        </button>
      </div>
    </div>

    <!-- Status strip -->
    <div class="err-strip">
      <div class="err-strip-left">
        <span class="err-strip-dot"></span>
        <span class="err-strip-txt">API server online</span>
      </div>
      <span class="err-strip-code">HTTP 404</span>
    </div>

  </div>
</main>

<!-- FOOTER NOTE -->
<footer class="err-footer">
  If you think this is a mistake, check the&nbsp;<a href="/docs">API docs</a>&nbsp;or&nbsp;<a href="/">return home</a>.
</footer>

<!-- TOAST -->
<div id="toast" style="
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--s1);border:1px solid var(--bd2);
  border-radius:100px;padding:8px 18px;
  font-family:var(--fm);font-size:11px;color:var(--t1);
  box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:9999;
  opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;
  white-space:nowrap;display:flex;align-items:center;gap:7px;
"><i id="toast-ico" class="fas fa-check" style="font-size:10px;color:var(--grn);"></i><span id="toast-txt"></span></div>

<script>
/* Show the actual attempted path */
(function() {
  const el = document.getElementById('err-path');
  const p  = window.location.pathname + window.location.search;
  el.textContent = p || '/unknown/path';
  el.title = window.location.href;
})();

/* Copy URL button */
document.getElementById('copy-path-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).then(() => {
    showToast('URL copied!');
  }).catch(() => showToast('Copy failed', true));
});

/* Toast */
function showToast(msg, err = false) {
  const el  = document.getElementById('toast');
  const ico = document.getElementById('toast-ico');
  ico.className = err ? 'fas fa-times-circle' : 'fas fa-check';
  ico.style.color = err ? 'var(--red)' : 'var(--grn)';
  document.getElementById('toast-txt').textContent = msg;
  el.style.opacity = '1';
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(el._tid);
  el._tid = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(14px)';
  }, 2000);
}
</script>
</body>
</html>
