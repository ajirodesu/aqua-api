<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F0F11">
  <title>404 — Not Found</title>
  <link rel="icon" href="/image/icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Display:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --md-bg:         #0F0F11;
      --md-surf:       #1A1B1E;
      --md-surf-1:     #202124;
      --md-surf-2:     #27282C;
      --md-out:        #35363A;
      --md-out-var:    #4A4B50;
      --md-on-bg:      #E3E3E6;
      --md-on-surf:    #C4C4C8;
      --md-on-surf-v:  #8E8E94;
      --md-on-surf-d:  #56565C;
      --md-pri:        #8AB4F8;
      --md-pri-10:     rgba(138,180,248,0.10);
      --md-pri-16:     rgba(138,180,248,0.16);
      --md-ter:        #81C995;
      --md-err:        #F28B82;
      --md-err-10:     rgba(242,139,130,0.08);
      --md-warn:       #FDD663;
      --fh: 'Google Sans', 'Roboto', sans-serif;
      --fd: 'Google Sans Display', 'Google Sans', sans-serif;
      --fm: 'Roboto Mono', monospace;
      --md-shape-xs: 4px; --md-shape-s: 8px; --md-shape-m: 12px;
      --md-shape-l: 16px; --md-shape-xl: 24px; --md-shape-full: 9999px;
      --md-dur-m: 200ms; --md-dur-l: 300ms; --md-dur-xl: 450ms;
      --md-ease: cubic-bezier(0.2, 0, 0, 1);
      --md-ease-e: cubic-bezier(0.05, 0.7, 0.1, 1);
      --HH: 64px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus { outline: none; }
    a, button { -webkit-tap-highlight-color: transparent; }
    ::selection { background: var(--md-pri-16); color: var(--md-on-bg); }

    html { scroll-behavior: smooth; }
    body {
      background: var(--md-bg); color: var(--md-on-bg);
      font-family: var(--fh); font-size: 14px; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 600; height: var(--HH);
      background: rgba(15,15,17,0.92);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid var(--md-out);
    }
    .hdr-inner { height: 100%; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .hdr-mid { font-family: var(--fd); font-size: 16px; font-weight: 500; color: var(--md-on-bg); flex: 1; text-align: center; }
    .hico { width: 40px; height: 40px; border-radius: var(--md-shape-full); border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--md-on-surf-v); font-size: 16px; text-decoration: none; transition: background var(--md-dur-m), color var(--md-dur-m); flex-shrink: 0; }
    .hico:hover { background: rgba(255,255,255,0.08); color: var(--md-on-bg); }

    /* ── MAIN ── */
    main { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; padding: calc(var(--HH) + 40px) 22px 64px; }

    /* ── ERROR CARD ── */
    .err-card {
      width: 100%; max-width: 460px;
      background: var(--md-surf); border: 1px solid var(--md-out);
      border-radius: var(--md-shape-xl); overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28), 0 8px 32px rgba(0,0,0,0.44);
      opacity: 0; transform: translateY(20px);
      animation: rise .45s var(--md-ease-e) .08s forwards;
    }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    .err-top {
      padding: 40px 32px 28px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      border-bottom: 1px solid var(--md-out);
    }

    /* Error code */
    .err-code-wrap { position: relative; margin-bottom: 20px; }
    .err-code {
      font-family: var(--fd); font-weight: 700; font-size: clamp(80px, 18vw, 108px);
      letter-spacing: -0.04em; line-height: 1;
      color: var(--md-surf-3);
    }
    .err-code-overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    /* 404 number — plain theme error color (no gradient) */
    .err-code-num {
      font-family: var(--fd); font-weight: 700; font-size: clamp(80px, 18vw, 108px);
      letter-spacing: -0.04em; line-height: 1;
      color: var(--md-err);
    }

    /* MD3 icon container — now uses proper 404 icon */
    .err-icon {
      width: 52px; height: 52px; border-radius: var(--md-shape-m);
      background: var(--md-err-10); border: 1px solid rgba(242,139,130,.20);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: var(--md-err); margin-bottom: 18px;
    }
    .err-title { font-family: var(--fd); font-size: 22px; font-weight: 500; color: var(--md-on-bg); letter-spacing: -.02em; margin-bottom: 8px; }
    .err-msg { font-family: var(--fh); font-size: 13px; color: var(--md-on-surf); line-height: 1.7; max-width: 300px; }

    /* Path row */
    .err-path-row {
      display: flex; align-items: center; gap: 10px; margin-top: 20px;
      background: var(--md-surf-1); border: 1px solid var(--md-out);
      border-radius: var(--md-shape-m); padding: 10px 14px;
      max-width: 340px; width: 100%;
    }
    .err-path-ico { font-size: 11px; color: var(--md-on-surf-d); flex-shrink: 0; }
    .err-path-txt { font-family: var(--fm); font-size: 11px; color: var(--md-on-surf-v); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: left; }
    .err-badge { font-family: var(--fm); font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: var(--md-shape-xs); letter-spacing: .06em; flex-shrink: 0; text-transform: uppercase; background: var(--md-err-10); color: var(--md-err); border: 1px solid rgba(242,139,130,.22); }

    /* ── ACTIONS ── */
    .err-actions { padding: 22px 24px 24px; display: flex; flex-direction: column; gap: 10px; }

    /* MD3 Filled button */
    .btn-primary {
      width: 100%; padding: 12px; border-radius: var(--md-shape-full);
      background: var(--md-pri); color: var(--md-on-pri);
      font-family: var(--fh); font-size: 14px; font-weight: 500;
      border: none; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity var(--md-dur-m), box-shadow var(--md-dur-m);
      box-shadow: 0 1px 4px rgba(138,180,248,.2);
    }
    .btn-primary:hover { opacity: .88; box-shadow: 0 4px 14px rgba(138,180,248,.3); }

    .err-sec-row { display: flex; gap: 8px; }
    .btn-sec {
      flex: 1; padding: 10px 12px; border-radius: var(--md-shape-full);
      background: transparent; border: 1px solid var(--md-out);
      font-family: var(--fh); font-size: 12px; font-weight: 500;
      color: var(--md-on-surf); cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: border-color var(--md-dur-m), color var(--md-dur-m), background var(--md-dur-m);
    }
    .btn-sec:hover { border-color: var(--md-pri-16); color: var(--md-pri); background: rgba(138,180,248,.08); }

    /* ── STATUS STRIP ── */
    .err-strip {
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: var(--md-surf-1); border-top: 1px solid var(--md-out);
    }
    .err-strip-left { display: flex; align-items: center; gap: 8px; }
    .err-strip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--md-ter); flex-shrink: 0; animation: pip 2.4s ease-in-out infinite; }
    @keyframes pip { 0%,100%{opacity:1} 50%{opacity:.3} }
    .err-strip-txt { font-family: var(--fh); font-size: 11px; font-weight: 500; color: var(--md-on-surf-v); letter-spacing: .04em; text-transform: uppercase; }
    .err-strip-code { font-family: var(--fm); font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: var(--md-shape-xs); letter-spacing: .08em; text-transform: uppercase; background: var(--md-err-10); color: var(--md-err); border: 1px solid rgba(242,139,130,.20); }

    /* ── FOOTER ── */
    .err-footer { position: relative; text-align: center; padding: 0 22px 32px; font-family: var(--fh); font-size: 12px; color: var(--md-on-surf-d); opacity: 0; animation: rise .45s var(--md-ease-e) .3s forwards; }
    .err-footer a { color: var(--md-on-surf-d); text-decoration: none; transition: color var(--md-dur-m); }
    .err-footer a:hover { color: var(--md-pri); }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #2A2B2E; border: 1px solid var(--md-out); border-radius: var(--md-shape-l); padding: 10px 20px; font-family: var(--fh); font-size: 13px; color: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.25); z-index: 9999; opacity: 0; transition: opacity var(--md-dur-m), transform var(--md-dur-m) var(--md-ease-e); pointer-events: none; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    #toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--md-out); border-radius: 4px; }
    @media(max-width:767px) { ::-webkit-scrollbar { display: none; } }
  </style>
</head>
<body>
  <header id="hdr">
    <div class="hdr-inner">
      <div><a class="hico" href="/" aria-label="Home"><i class="fas fa-arrow-left"></i></a></div>
      <div class="hdr-mid">Page Not Found</div>
      <div><a class="hico" href="/docs" aria-label="Docs"><i class="fas fa-book"></i></a></div>
    </div>
  </header>

  <main>
    <div class="err-card">
      <div class="err-top">
        <div class="err-code-wrap">
          <div class="err-code" aria-hidden="true">404</div>
          <div class="err-code-overlay"><div class="err-code-num">404</div></div>
        </div>

        <!-- Fixed: proper 404 icon (broken link) -->
        <div class="err-icon"><i class="fas fa-link-slash"></i></div>

        <div class="err-title">Page Not Found</div>
        <div class="err-msg">The endpoint you're looking for doesn't exist, has been moved, or the URL was mistyped.</div>
        <div class="err-path-row">
          <i class="fas fa-terminal err-path-ico"></i>
          <span class="err-path-txt" id="err-path">/unknown/path</span>
          <span class="err-badge">404</span>
        </div>
      </div>
      <div class="err-actions">
        <a class="btn-primary" href="/"><i class="fas fa-house" style="font-size:13px;"></i>Back to Home</a>
        <div class="err-sec-row">
          <a class="btn-sec" href="/docs"><i class="fas fa-book" style="font-size:11px;"></i>Docs</a>
          <button class="btn-sec" onclick="history.back()"><i class="fas fa-arrow-left" style="font-size:11px;"></i>Go Back</button>
          <button class="btn-sec" id="copy-path-btn"><i class="fas fa-copy" style="font-size:11px;"></i>Copy URL</button>
        </div>
      </div>
      <div class="err-strip">
        <div class="err-strip-left"><span class="err-strip-dot"></span><span class="err-strip-txt">API server online</span></div>
        <span class="err-strip-code">HTTP 404</span>
      </div>
    </div>
  </main>

  <footer class="err-footer">
    If you think this is a mistake, check the&nbsp;<a href="/docs">API docs</a>&nbsp;or&nbsp;<a href="/">return home</a>.
  </footer>

  <div id="toast"><i id="toast-ico" class="fas fa-check" style="font-size:11px;"></i><span id="toast-txt"></span></div>

  <script>
    (function(){
      const el=document.getElementById('err-path');
      const p=window.location.pathname+window.location.search;
      el.textContent=p||'/unknown/path';el.title=window.location.href;
    })();
    document.getElementById('copy-path-btn').addEventListener('click',()=>{
      navigator.clipboard.writeText(window.location.href).then(()=>showToast('URL copied!')).catch(()=>showToast('Copy failed',true));
    });
    function showToast(msg,err=false){
      const el=document.getElementById('toast'),ico=document.getElementById('toast-ico');
      ico.className=err?'fas fa-circle-xmark':'fas fa-circle-check';
      document.getElementById('toast-txt').textContent=msg;
      el.classList.add('on');clearTimeout(el._tid);
      el._tid=setTimeout(()=>el.classList.remove('on'),2200);
    }
  </script>
</body>
</html>
